name: daily-screening

# 毎日 07:30 JST（= 22:30 UTC 前日）に実行。手動実行(workflow_dispatch)も可。
# ※ GitHub Actions の cron は UTC。実行はキュー混雑で数分〜遅れることがあります。
on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      # 前回実行の signals/（history.jsonl / earnings_dates.json）を引き継ぐローリングキャッシュ。
      # fetch_earnings.py が前回までの決算日キャッシュを読めるよう、チェックアウト直後に復元する。
      # key は毎回ユニーク（run_id）にして必ず保存し、restore-keys で直近のキャッシュを復元する。
      - name: 前回の状態を復元（差分通知・決算日キャッシュ）
        uses: actions/cache@v4
        with:
          path: signals
          key: signals-state-${{ github.run_id }}
          restore-keys: |
            signals-state-

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Node セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 依存インストール（yfinance / lxml=決算日スクレイプ用）
        run: python -m pip install --quiet yfinance lxml

      # v5フェーズI（disclosure_classify.mjs）が @anthropic-ai/sdk を使うため必要。
      - name: Node依存インストール
        run: npm ci

      - name: データ取得（指標＋日経225）
        run: |
          python fetch_market.py
          python fetch_data.py

      # 決算日の更新（1回40銘柄ずつ。失敗しても致命的でないため continue-on-error）
      - name: 決算日の更新（決算接近の警告用）
        continue-on-error: true
        run: python fetch_earnings.py

      # v5フェーズI: 適時開示の取得＋分類（前向き蓄積の開始点）。
      # この段階では screen_daily の出力は一切変えない＝失敗してもスクリーニング自体は継続する。
      # ANTHROPIC_API_KEY 未設定なら分類はスキップされ、取得のみ行われる（disclosure_classify.mjs内で判定）。
      - name: 適時開示の取得・分類（AI情報レイヤー・蓄積のみ）
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node disclosure_fetch.mjs
          node disclosure_classify.mjs

      # イナゴ盤: 新テーマ候補(点火クラスタ)の検知のみクラウドに相乗り。
      # screen_daily の通知に短く追記する(下記)。失敗しても本体のスクリーニングは継続。
      # Grok命名(grok_name.py)はxAI課金・鍵管理が別途必要なためクラウドでは実行しない(ローカル専用)。
      - name: 新テーマ候補の検知（イナゴ盤・点火クラスタ）
        continue-on-error: true
        run: |
          cd inago
          node build_data_js.mjs
          node detect_clusters.mjs data.js

      - name: 判定ロジックを App.jsx から再生成
        run: node build_analysis.mjs

      # テスト失敗＝ジョブ失敗＝通知が飛ばない（壊れたシグナルを配らない）。これは意図した挙動。
      - name: テスト（判定ロジックの健全性）
        run: node run_tests.mjs

      - name: スクリーニング＋通知
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SIGNALS: strong
        run: node screen_daily.mjs

      - name: レポートを成果物として保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-report
          path: signals/
          if-no-files-found: ignore
