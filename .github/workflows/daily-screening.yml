name: daily-screening

# 毎日 07:30 JST（= 22:30 UTC 前日）に実行。手動実行(workflow_dispatch)も可。
# ※ GitHub Actions の cron は UTC。実行はキュー混雑で数分〜遅れることがあります。
on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Node セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 依存インストール（yfinance）
        run: python -m pip install --quiet yfinance

      - name: データ取得（指標＋日経225）
        run: |
          python fetch_market.py
          python fetch_data.py

      - name: 判定ロジックを App.jsx から再生成
        run: node build_analysis.mjs

      - name: スクリーニング＋通知
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          SIGNALS: strong
        run: node screen_daily.mjs

      - name: レポートを成果物として保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-report
          path: signals/
          if-no-files-found: ignore
